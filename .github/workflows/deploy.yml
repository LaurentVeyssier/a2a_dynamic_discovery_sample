name: Build and Deploy Python App

on:
  push:
    branches:
      - main  # Trigger every time you push to main
  workflow_dispatch: # Allows you to trigger the deployment manually

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen  # This uses your uv.lock file perfectly

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'a2a-discovery-demo-app' # Use your actual Azure Web App name here