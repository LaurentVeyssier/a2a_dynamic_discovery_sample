name: Build and Deploy Python App to Azure

on:
  push:
    branches:
      - main  # Change if your default branch is different
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # This tracks the deployment in GitHub's UI
    environment:
      name: production
      url: 'https://a2a-with-dynamic-discovery-fxdkbva0hufnc6ev.westeurope-01.azurewebsites.net' # <-- UPDATE THIS

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies using uv
        env:
          # Forces uv to create the virtual environment as 'antenv' for Azure
          UV_PROJECT_ENVIRONMENT: antenv 
        run: |
          uv sync --frozen

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'a2a-with-dynamic-discovery' # <-- UPDATE THIS
          slot-name: 'production'
          package: .
